server:
  port: 8080

spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3:8b
      embedding:
        model: qwen3-embedding:latest
    vectorstore:
      redis:
        initialize-schema: true
        index: my-ai-index
        prefix: "doc:"



  data:
    redis:
      port: 6379
      host: localhost
      password: infini_rag_flow

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_teacher
    username: root
    password: 123456
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

minio:
  endpoint: http://localhost:9000
  access-key: rag_flow
  secret-key: infini_rag_flow

app:
  document:
    root-path: ./user-data          # 你已存在的配置
    incremental: true
    state-file: ./data-loader-state.json
  courseware:
    output-dir: ./generated-ppts    # PPT 输出目录
    template: templates/courseware-template.pptx   # 模板文件（位于 src/main/resources/templates/）
    bucket: courseware              # MinIO 存储桶名称

